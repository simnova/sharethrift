            </div>
        </div>
    </div>


    <script defer>
      const hrTemplate = data => `
        <div><hr class="hr-text" data-content="${data.text}"></div>
      `;



      const htmlToElements = (html) => {
        console.log(html);
          var template = document.createElement('template');
          template.innerHTML = html;
          return template.content;
      }
      
      window.$(function() {
        
        var html = hrTemplate({text:'or'}).trim();
        document.querySelector('.claims-provider-list-buttons').after(htmlToElements(html));
        var forgotPassword = document.querySelector('#forgotPassword');
        forgotPassword.innerText = 'Forgot Password?';

        var forgotPasswordContainer = document.createElement('div');
        forgotPasswordContainer.classList.add('forgot-password-container');
        forgotPasswordContainer.classList.add('text-right');

        forgotPasswordContainer.appendChild(forgotPassword)

        document.querySelector('.localAccount').after(forgotPasswordContainer);
        document.querySelector('#forgotPassword').after(htmlToElements(html));
        
        
     //   $(html).insertAfter('.claims-provider-list-buttons social');


          console.log( "ready!" );
      });
      window.$( window ).on( "load", function() {
        console.log( "window loaded" );
      });
    </script>
