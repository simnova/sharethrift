query SearchResultsContainerListingSearch($input: ListingSearchInput!) {
  listingSearch(input: $input) {
    ...ListingContainerListingSearchFields
  }
}

fragment SearchResultsListingSearchFields on Listing {
  id
  account {
    id
    name
  }
  title
  description
  tags
  createdAt
  primaryCategory {
    id
    name
  }
  photos {
    order
    documentId
  }
  location {
    address {
      freeformAddress
    }
  }
}