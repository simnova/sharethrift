query ListingDetailContainerListings($id: ID!) {
  listing(id: $id) {
    ...ListingsFields
  }
}

mutation ListingDetailContainerUpdateDraft( $input: ListingDraft!) {
  updateDraft(input: $input) {
    title
  }
}

mutation ListingDetailContainerPublishDraft($id: ID!) {
  publishDraft(id: $id) {
    title
  }
}


fragment ListingsFields on Listing {
  id
  account {
    id
    name
  }
  title
  description
  tags
  createdAt
  primaryCategory {
    id
    name
  }
  draft {
    title
    description
    tags
    statusHistory {
      statusCode
      statusDetail
      createdAt

    }
    primaryCategory {
      id
      name
    }
  }
  photos {
    order
    documentId
  }
  location {
    address {
      freeformAddress
    }
  }
}