query ListingDetailContainerListings($id: ID!) {
  listing(id: $id) {
    ...ListingDetailContainerListingsFields
  }
}

mutation ListingDetailContainerUpdateDraft( $input: ListingDraft!) {
  updateDraft(input: $input) {
    title
  }
}
mutation ListingDetailContainerPublishDraft($id: ID!) {
  listingDraftPublish(id: $id) 
}
mutation ListingDetailContainerUnpublish($id: ID!) {
  listingUnpublish(id: $id) 
}
mutation ListingDetailContainerCreateDraft($id: ID!) {
  listingDraftCreate(id: $id) 
}


fragment ListingDetailContainerListingsFields on Listing {
  id
  account {
    id
    name
  }
  title
  description
  statusCode
  tags
  createdAt
  primaryCategory {
    id
    name
  }
  draft {
    title
    description
    tags
    statusHistory {
      id
      statusCode
      statusDetail
      createdAt

    }
    photos {
      order
      documentId
    }
    primaryCategory {
      id
      name
    }
  }
  photos {
    order
    documentId
  }
  location {
    address {
      freeformAddress
    }
  }
}