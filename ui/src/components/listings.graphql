query ListingsListings {
  listings {
    ...ListingsFields
  }
}

fragment ListingsFields on Listing {
  id
  account {
    id
    name
  }
  title
  description
  tags
  createdAt
  primaryCategory {
    id
    name
  }
  draft {
    title
    description
    tags
    statusHistory {
      statusCode
      statusDetail
      createdAt

    }
    primaryCategory {
      id
      name
    }
  }
  photos {
    order
    documentId
  }
  location {
    address {
      freeformAddress
    }
  }
}