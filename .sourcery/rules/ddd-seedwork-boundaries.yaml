version: '2'

# Domain Seedwork Boundary Rules
#
# The domain seedwork (packages/cellix/domain-seedwork/) provides foundational
# DDD abstractions and must not depend on app-specific, infrastructure, or
# framework-specific packages.
#
# Reference:
#   - packages/cellix/domain-seedwork/.github/instructions/cellix-domain-seedwork.instructions.md
#   - packages/cellix/domain-seedwork/.github/instructions/domain-seedwork.instructions.md

rules:
- id: no-sthrift-in-seedwork
  description: Domain seedwork must not import app-specific @sthrift packages.
  explanation: |
    Domain seedwork provides generic DDD abstractions that must be
    reusable across projects. App-specific @sthrift packages must not
    leak into seedwork code.

    Reference: cellix-domain-seedwork.instructions.md
  any:
  - pattern: |
      import ${_} from '@sthrift/domain'
  - pattern: |
      import ${_} from '@sthrift/graphql'
  - pattern: |
      import ${_} from '@sthrift/persistence'
  - pattern: |
      import ${_} from '@sthrift/rest'
  - pattern: |
      import ${_} from '@sthrift/application-services'
  - pattern: |
      import ${_} from '@sthrift/ui-components'
  - pattern: |
      import ${_} from '@sthrift/data-sources-mongoose-models'
  - pattern: |
      import ${_} from '@sthrift/event-handler'
  - pattern: |
      import ${_} from '@sthrift/context-spec'
  - pattern: |
      import ${_} from '@sthrift/acceptance-tests'
  - pattern: |
      import ${_} from '@sthrift/arch-unit-tests'
  language:
  - typescript
  tags:
  - ddd-seedwork
  tests:
  - match: |
      import { Community } from '@sthrift/domain'
  - match: |
      import { CommunityRepository } from '@sthrift/persistence'
  - no-match: |
      import { DomainEntity } from './domain-entity'

- id: no-apps-in-seedwork
  description: Domain seedwork must not import @apps application packages.
  explanation: |
    Domain seedwork is a library package and must not depend on
    application-level packages.

    Reference: cellix-domain-seedwork.instructions.md
  any:
  - pattern: |
      import ${_} from '@apps/api'
  - pattern: |
      import ${_} from '@apps/server-messaging-mock'
  - pattern: |
      import ${_} from '@apps/server-payment-mock'
  - pattern: |
      import ${_} from '@apps/server-oauth2-mock'
  - pattern: |
      import ${_} from '@apps/server-mongodb-memory-mock'
  language:
  - typescript
  tags:
  - ddd-seedwork
  tests:
  - match: |
      import { handler } from '@apps/api'
  - no-match: |
      import { DomainEntity } from './domain-entity'

- id: no-mongoose-in-seedwork
  description: Domain seedwork must not import Mongoose.
  explanation: |
    Domain seedwork provides pure DDD abstractions and must not
    depend on database frameworks. Mongoose integration belongs
    in @cellix/data-sources-mongoose or @cellix/mongoose-seedwork.

    Reference: cellix-domain-seedwork.instructions.md
  any:
  - pattern: |
      import ${_} from 'mongoose'
  - pattern: |
      import type ${_} from 'mongoose'
  language:
  - typescript
  tags:
  - ddd-seedwork
  tests:
  - match: |
      import { Schema } from 'mongoose'
  - no-match: |
      import { DomainEntity } from './domain-entity'

- id: no-apollo-in-seedwork
  description: Domain seedwork must not import Apollo Server.
  explanation: |
    Domain seedwork provides pure DDD abstractions and must not
    depend on API transport frameworks like Apollo Server.

    Reference: cellix-domain-seedwork.instructions.md
  any:
  - pattern: |
      import ${_} from '@apollo/server'
  - pattern: |
      import ${_} from '@apollo/server/${...}'
  language:
  - typescript
  tags:
  - ddd-seedwork
  tests:
  - match: |
      import { ApolloServer } from '@apollo/server'
  - no-match: |
      import { DomainEntity } from './domain-entity'

- id: no-express-in-seedwork
  description: Domain seedwork must not import Express.
  explanation: |
    Domain seedwork provides pure DDD abstractions and must not
    depend on HTTP frameworks like Express.

    Reference: cellix-domain-seedwork.instructions.md
  pattern: |
    import ${_} from 'express'
  language:
  - typescript
  tags:
  - ddd-seedwork
  tests:
  - match: |
      import express from 'express'
  - no-match: |
      import { DomainEntity } from './domain-entity'

- id: no-azure-functions-in-seedwork
  description: Domain seedwork must not import Azure Functions SDK.
  explanation: |
    Domain seedwork provides pure DDD abstractions and must not
    depend on hosting frameworks like Azure Functions.

    Reference: cellix-domain-seedwork.instructions.md
  pattern: |
    import ${_} from '@azure/functions'
  language:
  - typescript
  tags:
  - ddd-seedwork
  tests:
  - match: |
      import { app } from '@azure/functions'
  - no-match: |
      import { DomainEntity } from './domain-entity'
