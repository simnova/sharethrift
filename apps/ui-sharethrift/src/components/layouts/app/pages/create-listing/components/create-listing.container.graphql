fragment ItemListingFields on ItemListing {
	id
	title
	description
	category
	location
	sharingPeriodStart
	sharingPeriodEnd
	state
	images
	createdAt
	updatedAt
	schemaVersion
}

mutation HomeCreateListingContainerCreateItemListing(
	$input: ItemListingCreateInput!
) {
	createItemListing(input: $input) {
		status {
			success
			errorMessage
		}
		listing {
			...ItemListingFields
		}
	}
}
