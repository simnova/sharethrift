overwrite: true
schema: "./graphql/schema/*(!(queries-documents|mutations-documents)**|*)/*.graphql"
documents: "./graphql/schema/*(queries-documents|mutations-documents)**/**.graphql"
generates:
  graphql/generated.ts:
    config:
      contextType: "./context#Context"
      mappers:
        Category: ../shared/data-sources/cosmos-db/models/category#CategoryType
        Listing: ../shared/data-sources/cosmos-db/models/listing#ListingType
        Location: ../shared/data-sources/cosmos-db/models/location#LocationType
        Point: ../shared/data-sources/cosmos-db/models/point#PointType
        User: ../shared/data-sources/cosmos-db/models/user#UserType
    plugins:
      - "typescript"
      - "typescript-resolvers"
  ./graphql.schema.json:
    plugins:
      - "introspection"

  ../ui/src/generated.tsx:
    config:
      withHooks: true
      withHOC: false
      withComponent: false
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typed-document-node"
hooks:
  afterAllFileWrite:
    - npx prettier --write