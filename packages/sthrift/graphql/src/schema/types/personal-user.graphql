type PersonalUser implements MongoBase {
	userType: String
	isBlocked: Boolean
	account: PersonalUserAccount
	hasCompletedOnboarding: Boolean
	id: ObjectID!
	schemaVersion: String
	createdAt: DateTime
	updatedAt: DateTime
	userIsAdmin: Boolean
}

type PersonalUserPage {
	items: [PersonalUser!]!
	total: Int!
	page: Int!
	pageSize: Int!
}

type PersonalUserAccount {
	accountType: String
	email: String
	username: String
	profile: PersonalUserAccountProfile
}

type PersonalUserAccountProfile {
	firstName: String
	lastName: String
	aboutMe: String
	location: PersonalUserAccountProfileLocation
	billing: PersonalUserAccountProfileBilling
}

type PersonalUserAccountProfileLocation {
	address1: String
	address2: String
	city: String
	state: String
	country: String
	zipCode: String
}

type PersonalUserAccountProfileBilling {
	cybersourceCustomerId: String
	subscription: PersonalUserAccountProfileBillingSubscription
	transactions: [PersonalUserAccountProfileBillingTransaction]
}

type PersonalUserAccountProfileBillingSubscription {
	subscriptionId: String
	planCode: String # code from cybersource
	status: String
	startDate: DateTime
}

type PersonalUserAccountProfileBillingTransaction {
	transactionId: String
	amount: Float
	referenceId: String
	status: String
	completedAt: DateTime
	errorMessage: String
}

type PersonalUserPaymentErrorInformation {
	reason: String
	message: String
}

type PersonalUserPaymentResponseAmountDetails {
	totalAmount: String
	currency: String
}

type PersonalUserPaymentResponseOrderInformation {
	amountDetails: PersonalUserPaymentResponseAmountDetails
}

type PersonalUserPaymentResponse {
	id: String
	status: String!
	success: Boolean
	message: String
	cybersourceCustomerId: String
	cybersourceSubscriptionId: String
	cybersourcePlanId: String
	errorInformation: PersonalUserPaymentErrorInformation
	orderInformation: PersonalUserPaymentResponseOrderInformation
}

type PersonalUserRefundResponse {
	id: String
	status: String!
	success: Boolean
	message: String
	errorInformation: PersonalUserPaymentErrorInformation
	orderInformation: PersonalUserPaymentResponseOrderInformation
}

input PersonalUserUpdateInput {
	id: ObjectID!
	isBlocked: Boolean
	hasCompletedOnboarding: Boolean
	account: PersonalUserAccountUpdateInput
}

input PersonalUserAccountUpdateInput {
	accountType: String
	username: String
	profile: PersonalUserAccountProfileUpdateInput
}

input PersonalUserAccountProfileUpdateInput {
	firstName: String
	lastName: String
	location: PersonalUserAccountProfileLocationUpdateInput
	aboutMe: String
}

input PersonalUserAccountProfileLocationUpdateInput {
	address1: String
	address2: String
	city: String
	state: String
	country: String
	zipCode: String
}

input PersonalUserProcessPaymentPaymentInstrumentInput {
	billingFirstName: String!
	billingLastName: String!
	billingEmail: String!
	billingPhone: String
	billingAddressLine1: String!
	billingAddressLine2: String
	billingCity: String!
	billingState: String!
	billingPostalCode: String!
	billingCountry: String!
	paymentToken: String!
}

input PersonalUserProcessPaymentInput {
	userId: ObjectID!

	paymentAmount: Float!
	currency: String!

	paymentInstrument: PersonalUserProcessPaymentPaymentInstrumentInput!
}

input PersonalUserRefundRequestOrderInformationAmountDetailsInput {
	totalAmount: Float!
	currency: String!
}

input PersonalUserRefundOrderInformationInput {
	amountDetails: PersonalUserRefundRequestOrderInformationAmountDetailsInput!
}

input PersonalUserRefundRequestInput {
	userId: ObjectID!
	transactionId: String!
	amount: Float
	orderInformation: PersonalUserRefundOrderInformationInput!
}

type PersonalUserMutationResult implements MutationResult {
	status: MutationStatus!
	personalUser: PersonalUser
}

type PersonalUserProcessPaymentMutationResult implements MutationResult {
	status: MutationStatus!
	paymentResponse: PersonalUserPaymentResponse
}

type PersonalUserRefundPaymentMutationResult implements MutationResult {
	status: MutationStatus!
	refundResponse: PersonalUserRefundResponse
}

extend type Query {
	# Personal User queries
	personalUserById(id: ObjectID!): PersonalUser
	currentPersonalUserAndCreateIfNotExists: PersonalUser!
	personalUserCybersourcePublicKeyId: String!
	allUsers(
		page: Int!
		pageSize: Int!
		searchText: String
		statusFilters: [String!]
		sorter: SorterInput
	): PersonalUserPage!
}

extend type Mutation {
	# Personal User mutations
	personalUserUpdate(
		input: PersonalUserUpdateInput!
	): PersonalUserMutationResult!
	blockUser(userId: ObjectID!): PersonalUserMutationResult!
	unblockUser(userId: ObjectID!): PersonalUserMutationResult!

	# Payment mutations
	processPayment(
		input: PersonalUserProcessPaymentInput!
	): PersonalUserProcessPaymentMutationResult!
	refundPayment(
		request: PersonalUserRefundRequestInput!
	): PersonalUserRefundPaymentMutationResult!
}
