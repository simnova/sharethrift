type Conversation implements MongoBase {
	sharer: User!
	reserver: User!
	listing: ItemListing!
	messagingConversationId: String!
	messages: [ConversationMessage!]!
	id: ObjectID!
	schemaVersion: String!
	createdAt: DateTime!
	updatedAt: DateTime!
}

type ConversationMessage {
	id: ObjectID!
	messagingMessageId: String!
	authorId: ObjectID!
	content: String!
	createdAt: DateTime!
}

input ConversationCreateInput {
	sharerId: ObjectID!
	reserverId: ObjectID!
	listingId: ObjectID!
}

input ConversationSendMessageInput {
	conversationId: ObjectID!
	content: String!
}

type ConversationMutationResult implements MutationResult {
	status: MutationStatus!
	conversation: Conversation
}

type ConversationSendMessageMutationResult implements MutationResult {
	status: MutationStatus!
	message: ConversationMessage
}

extend type Query {
	conversationsByUser(userId: ObjectID!): [Conversation]
	conversation(conversationId: ObjectID!): Conversation
}

extend type Mutation {
	createConversation(
		input: ConversationCreateInput!
	): ConversationMutationResult!
	sendMessage(
		input: ConversationSendMessageInput!
	): ConversationSendMessageMutationResult!
}
